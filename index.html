<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag anti-cache agar browser wajib mengambil versi terbaru -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piieroglyph App</title>
    <link rel="manifest" href="manifest.json?v=2">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #ffffff; 
            position: relative;
        }
        /* Trik menyembunyikan banner Google Apps Script */
        iframe { 
            border: none; 
            width: 100%; 
            height: calc(100% + 36px); 
            display: block; 
            position: absolute;
            top: -36px;
            left: 0;
        }
    </style>
</head>
<body>

    <iframe id="app-frame" allow="camera; microphone; fullscreen; display-capture; geolocation"></iframe>

    <script>
        // Ambil URL dari parameter ?url= (jika ada)
        const urlParams = new URLSearchParams(window.location.search);
        let appUrl = urlParams.get('url');

        // Jika ada di parameter, simpan ke memori HP agar saat dibuka dari Home Screen tetap ingat
        if (appUrl) {
            localStorage.setItem('savedAppsScriptUrl', appUrl);
        } else {
            // Jika tidak ada parameter (misal dibuka dari layar utama), ambil dari memori
            appUrl = localStorage.getItem('savedAppsScriptUrl');
        }

        // Jika tidak ada di memori dan tidak ada di parameter, fallback ke hardcode
        if (!appUrl) {
            appUrl = "URL_APPS_SCRIPT_ANDA_DI_SINI"; 
        }

        if (appUrl && appUrl !== "URL_APPS_SCRIPT_ANDA_DI_SINI") {
            document.getElementById('app-frame').src = appUrl;
        } else {
            document.body.innerHTML = "<h3 style='text-align:center; margin-top:20px; font-family:sans-serif;'>Error: URL Apps Script belum diatur.<br><br>Buka pertama kali dengan menambahkan ?url=link_apps_script di akhir alamat website Anda.</h3>";
        }

        if ('serviceWorker' in navigator) {
            // Ditambahkan versi unik (?v=2) agar service worker lama terhapus dari memori HP
            navigator.serviceWorker.register('sw.js?v=2');
        }
    </script>
</body>
</html>
