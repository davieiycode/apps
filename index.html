<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piieroglyph</title>
    <!-- Memanggil manifest fisik asli agar Android memicu PWA Standalone -->
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <!-- Link Apps Script Anda langsung dikunci di sini, aman dan tersembunyi dari user -->
    <iframe src="https://google.com"></iframe>

    <script>
        // Registrasi Service Worker wajib Android
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
