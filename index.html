<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS PWA Builder</title>
    <link rel="manifest" id="pwa-manifest">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif;}
        iframe { border: none; width: 100%; height: 100%; display: none; }
        .error { padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="msg" class="error">Menghubungkan ke Apps Script...</div>
    <iframe id="appFrame"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let appUrl = urlParams.get('url');
        let appName = urlParams.get('name');
        let appIcon = urlParams.get('icon');

        // Jika dibuka dari Home Screen (tanpa parameter), ambil data lama yang tersimpan di memori HP
        if (!appUrl) {
            appUrl = localStorage.getItem('saved_url');
            appName = localStorage.getItem('saved_name') || "GAS PWA";
            appIcon = localStorage.getItem('saved_icon') || "https://flaticon.com";
        } else {
            // Jika ada parameter baru, simpan ke memori HP
            appName = appName || "GAS PWA";
            appIcon = appIcon || "https://flaticon.com";
            
            localStorage.setItem('saved_url', appUrl);
            localStorage.setItem('saved_name', appName);
            localStorage.setItem('saved_icon', appIcon);
        }

        if (appUrl && appUrl.startsWith('https://script.google.com')) {
            // Terapkan manifest dinamis agar tombol Install muncul dengan Nama & Ikon yang sesuai
            applyManifest(appName, appIcon);

            const frame = document.getElementById('appFrame');
            document.getElementById('msg').style.display = 'none';
            frame.src = appUrl;
            frame.style.display = 'block';
        } else {
            document.getElementById('msg').innerHTML = `
                <h3>Cara Penggunaan:</h3>
                <p>Ketik URL di address bar dengan format berikut:</p>
                <code style="display:block; background:#eee; padding:10px; word-break:break-all; text-align:left;">
                ${window.location.origin}${window.location.pathname}?name=<b>NamaAplikasi</b>&icon=<b>https://link.com</b>&url=<b>URL_APPS_SCRIPT</b>
                </code>
            `;
        }

        function applyManifest(name, icon) {
            document.title = name;
            const manifestObj = {
                "name": name,
                "short_name": name,
                "start_url": window.location.origin + window.location.pathname,
                "display": "standalone",
                "background_color": "#ffffff",
                "theme_color": "#4285F4",
                "icons": [{ "src": icon, "sizes": "512x512", "type": "image/png" }]
            };
            const blob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
            document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(blob));
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
