<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag anti-cache agar browser wajib mengambil versi terbaru -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piieroglyph App</title>
    <link rel="manifest" href="manifest.json?v=2">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <!-- Link Apps Script Anda langsung dikunci di sini -->
    <iframe src="https://google.com"></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            // Ditambahkan versi unik (?v=2) agar service worker lama terhapus dari memori HP
            navigator.serviceWorker.register('sw.js?v=2');
        }
    </script>
</body>
</html>
