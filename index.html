<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piieroglyph App</title>
    <link rel="manifest" href="manifest.json?v=3">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; font-family: sans-serif; }
        iframe { border: none; width: 100%; height: 100%; display: none; }
        .auth-box { padding: 30px; text-align: center; margin-top: 50px; }
        .btn { background: #4285F4; color: white; padding: 12px 24px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <!-- Tombol darurat jika Google meminta autentikasi akun -->
    <div id="authRequired" class="auth-box" style="display:none;">
        <h3>Autentikasi Diperlukan</h3>
        <p>Google memerlukan izin akses akun untuk membuka aplikasi ini pertama kali.</p>
        <br>
        <a id="loginBtn" href="#" target="_top" class="btn">Masuk dengan Google</a>
    </div>

    <!-- Frame Utama Jalur Aplikasi -->
    <iframe id="appFrame"></iframe>

    <script>
        // Link utama Apps Script Anda
        const targetUrl = "https://google.com";

        // Pasang link login ke tombol darurat
        document.getElementById('loginBtn').href = targetUrl;

        // Beri perlindungan deteksi login
        const frame = document.getElementById('appFrame');
        frame.src = targetUrl;
        frame.style.display = 'block';

        // Deteksi jika dalam waktu 4 detik halaman gagal dimuat (terbendung login Google)
        const checkLoad = setTimeout(function() {
            try {
                // Jika iframe kosong atau menolak koneksi akibat login
                if (!frame.contentWindow || frame.contentWindow.length === 0) {
                    showAuthPrompt();
                }
            } catch(e) {
                // Terjadi pemblokiran CORS Login Google
                showAuthPrompt();
            }
        }, 4000);

        function showAuthPrompt() {
            frame.style.display = 'none';
            document.getElementById('authRequired').style.display = 'block';
        }

        frame.onload = function() {
            clearTimeout(checkLoad); // Sukses termuat tanpa kendala login
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=3');
        }
    </script>
</body>
</html>
