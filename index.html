<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS PWA</title>
    <link rel="manifest" id="pwa-manifest">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif;}
        iframe { border: none; width: 100%; height: 100%; display: none; }
        .msg { padding: 20px; text-align: center; color: #555; }
    </style>
</head>
<body>

    <div id="statusMessage" class="msg">Menghubungkan ke Apps Script...</div>
    <iframe id="appFrame"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let appUrl = urlParams.get('url');
        let appName = urlParams.get('name');
        let appIcon = urlParams.get('icon');

        // 1. Jika dibuka dari Home Screen (kondisi normal tanpa parameter), ambil dari memori HP
        if (!appUrl) {
            appUrl = localStorage.getItem('saved_url');
            appName = localStorage.getItem('saved_name') || "GAS PWA";
            appIcon = localStorage.getItem('saved_icon') || "https://flaticon.com";
        } else {
            // 2. Jika diakses pertama kali lewat link panjang, kunci datanya ke memori HP
            appName = appName || "GAS PWA";
            appIcon = appIcon || "https://flaticon.com";
            
            localStorage.setItem('saved_url', appUrl);
            localStorage.setItem('saved_name', appName);
            localStorage.setItem('saved_icon', appIcon);

            // JANGAN langsung hapus URL. Beri jeda 3 detik agar sistem WebAPK Android sempat membaca parameter manifest-nya
            setTimeout(function() {
                const cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }, 3000);
        }

        // 3. Eksekusi Pemuatan Aplikasi
        if (appUrl && appUrl.startsWith('https://google.com')) {
            applyManifest(appName, appIcon);

            const frame = document.getElementById('appFrame');
            document.getElementById('statusMessage').style.display = 'none';
            frame.src = appUrl;
            frame.style.display = 'block';
        } else {
            document.getElementById('statusMessage').innerHTML = `
                <h3>Mesin PWA Siap!</h3>
                <p style="color:red;">Error: Parameter URL Apps Script hilang atau tidak terbaca.</p>
                <p>Silakan tutup tab ini dan klik ulang link registrasi lengkap Anda.</p>
            `;
        }

        // Fungsi injeksi manifest fisik buatan (Blob)
        function applyManifest(name, icon) {
            document.title = name;
            const manifestObj = {
                "name": name,
                "short_name": name,
                "start_url": window.location.origin + window.location.pathname,
                "display": "standalone",
                "background_color": "#ffffff",
                "theme_color": "#4285F4",
                "icons": [{ "src": icon, "sizes": "512x512", "type": "image/png" }]
            };
            const blob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
            document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(blob));
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
